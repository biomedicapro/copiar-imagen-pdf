<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Lector PDF con copia de página</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }

    #pdfContainer {
      margin-top: 20px;
    }

    canvas {
      display: block;
      margin: 20px auto;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      cursor: copy;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Subir y leer PDF</h2>

  <input type="file" id="pdfInput" accept="application/pdf" />
  <div id="status">Sube un PDF para visualizarlo.</div>

  <div id="pdfContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const input = document.getElementById("pdfInput");
    const container = document.getElementById("pdfContainer");
    const status = document.getElementById("status");

    input.addEventListener("change", async function () {
      const file = this.files[0];
      if (!file) return;

      container.innerHTML = "";
      status.textContent = "Cargando PDF...";

      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

      status.textContent = `PDF cargado: ${pdf.numPages} página(s). Doble click sobre una página para copiarla como imagen.`;

      for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
        const page = await pdf.getPage(pageNumber);

        const scale = 1.5;
        const viewport = page.getViewport({ scale });

        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;
        canvas.title = `Página ${pageNumber}`;

        await page.render({
          canvasContext: context,
          viewport
        }).promise;

        canvas.addEventListener("dblclick", async () => {
          try {
            canvas.toBlob(async (blob) => {
              const item = new ClipboardItem({
                "image/png": blob
              });

              await navigator.clipboard.write([item]);
              status.textContent = `Página ${pageNumber} copiada como imagen.`;
            }, "image/png");
          } catch (error) {
            console.error(error);
            status.textContent = "No se pudo copiar la imagen. Usa HTTPS o localhost.";
          }
        });

        container.appendChild(canvas);
      }
    });
  </script>

</body>
</html>

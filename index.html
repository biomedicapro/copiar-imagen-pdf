<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lector PDF</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }

    h2 {
      margin-top: 0;
    }

    #status {
      margin: 15px 0;
      font-weight: bold;
    }

    #pdfContainer {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .pageWrapper {
      position: relative;
      width: fit-content;
      margin: auto;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      border-radius: 8px;
    }

    .copyBtn {
      position: absolute;
      bottom: 12px;
      right: 12px;
      border: none;
      background: #1976d2;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }

    .copyBtn:hover {
      background: #125ca1;
    }
  </style>
</head>
<body>

  <h2>Subir PDF</h2>

  <input type="file" id="pdfInput" accept="application/pdf">

  <div id="status">
    Selecciona un PDF.
  </div>

  <div id="pdfContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const input = document.getElementById("pdfInput");
    const container = document.getElementById("pdfContainer");
    const status = document.getElementById("status");

    input.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      container.innerHTML = "";
      status.textContent = "Cargando PDF...";

      const buffer = await file.arrayBuffer();

      const pdf = await pdfjsLib.getDocument({
        data: buffer
      }).promise;

      status.textContent =
        `PDF cargado (${pdf.numPages} páginas).`;

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {

        const page = await pdf.getPage(pageNum);

        const scale = 1.5;

        const viewport = page.getViewport({
          scale
        });

        const wrapper = document.createElement("div");
        wrapper.className = "pageWrapper";

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
          canvasContext: ctx,
          viewport
        }).promise;

        const btn = document.createElement("button");
        btn.className = "copyBtn";
        btn.textContent = "Copiar imagen";

        btn.addEventListener("click", async () => {
          try {

            canvas.toBlob(async (blob) => {

              // Intentar copiar
              try {

                if (
                  navigator.clipboard &&
                  window.ClipboardItem
                ) {

                  await navigator.clipboard.write([
                    new ClipboardItem({
                      "image/png": blob
                    })
                  ]);

                  status.textContent =
                    `Página ${pageNum} copiada como imagen.`;

                  return;
                }

              } catch (err) {
                console.log("Clipboard no disponible");
              }

              // Compartir en móviles
              const file = new File(
                [blob],
                `pagina-${pageNum}.png`,
                { type: "image/png" }
              );

              if (
                navigator.canShare &&
                navigator.canShare({ files: [file] })
              ) {

                await navigator.share({
                  files: [file],
                  title: `Página ${pageNum}`
                });

                return;
              }

              // Fallback descarga
              const url = URL.createObjectURL(blob);

              const a = document.createElement("a");
              a.href = url;
              a.download = `pagina-${pageNum}.png`;
              a.click();

              URL.revokeObjectURL(url);

            }, "image/png");

          } catch (error) {

            console.error(error);

            status.textContent =
              "No se pudo copiar la página.";
          }
        });

        wrapper.appendChild(canvas);
        wrapper.appendChild(btn);

        container.appendChild(wrapper);
      }
    });
  </script>

</body>
</html>
